# ApplyTex search configuration
# Copy to ~/.applytex/searches.yaml and customize for your job search.
# applytex init generates a working file with the same schema.

# Max query tier for JobSpy, Workday, and smart-extract (default 2).
# jobspy_max_tier: 2
# workday_max_tier: 2

defaults:
  location: "San Francisco, CA"
  country_indeed: usa
  distance: 50
  hours_old: 72
  results_per_site: 100

locations:
  - location: "San Francisco, CA"
    remote: false
  - location: "United States"
    remote: true

location:
  accept_patterns:
    - "San Francisco"
    - "Bay Area"
    - "SF"
    - "California"
    - "CA"
    - "Remote"
    - "Hybrid"
    - "United States"
    - "US"
    - "USA"
  reject_patterns:
    - "New York only"
    - "Seattle only"
    - "onsite only"
    - "London, UK"
    - "India"
    - "Philippines"

# JobSpy boards (site_name). indeed + linkedin are most reliable.
sites:
  - indeed
  - linkedin

queries:
  - query: "software engineer"
    tier: 1
  - query: "backend engineer"
    tier: 1
  - query: "backend developer"
    tier: 1
  - query: "full stack developer"
    tier: 2
  - query: "full stack engineer"
    tier: 2
  - query: "python developer"
    tier: 2
  - query: "python engineer"
    tier: 2
  - query: "DevOps engineer"
    tier: 2
  - query: "site reliability engineer"
    tier: 2
  - query: "platform engineer"
    tier: 2
  - query: "cloud engineer"
    tier: 2
  - query: "data engineer"
    tier: 2
  - query: "infrastructure engineer"
    tier: 2
  - query: "software developer"
    tier: 3
  - query: "developer"
    tier: 3
  - query: "systems engineer"
    tier: 3
  - query: "automation engineer"
    tier: 3
  - query: "solutions engineer"
    tier: 3
  - query: "integration engineer"
    tier: 3
  - query: "ML engineer"
    tier: 3
  - query: "machine learning engineer"
    tier: 3
  - query: "AI engineer"
    tier: 3
  - query: "security engineer"
    tier: 3

# Skip jobs whose title contains any of these (case-insensitive)
exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
  - "principal scientist"
